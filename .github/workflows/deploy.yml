name: Deploy skills library site to GitHub Pages

on:
  # Rebuild whenever this repo changes
  push:
    branches: [main]
  # Manual rebuild button in the Actions tab
  workflow_dispatch:
  # Re-pull idemeum/skills periodically so source updates show up automatically
  schedule:
    - cron: "*/15 * * * *"
  # Optional: allow idemeum/skills to trigger a rebuild via webhook
  repository_dispatch:
    types: [source-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Quartz site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Quartz's createdModifiedDate works

      - name: Checkout idemeum/skills into github-source/
        uses: actions/checkout@v4
        with:
          repository: idemeum/skills
          ref: main
          path: github-source
          # If idemeum/skills is private, add a fine-grained PAT as a secret
          # named SOURCE_REPO_TOKEN and uncomment the next line:
          # token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
